services:
  - type: web
    name: healthsense-api
    env: python
    plan: starter
    region: oregon
    buildCommand: "python scripts/check_env.py --service api --warn-optional && pip install -r requirements.txt"
    startCommand: "uvicorn app.api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENV
        value: "production"
      - key: DEFAULT_COUNTRY_CODE
        value: "+44"
      - key: DATABASE_URL
        fromDatabase:
          name: healthsense-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: USE_AZURE_SPEECH
        value: "0"
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        sync: false
      - key: AZURE_SPEECH_ENDPOINT
        sync: false
      - key: USE_AZURE_AVATAR
        value: "0"
      - key: USE_AZURE_AVATAR_REALTIME_SUMMARY
        value: "1"
      - key: AZURE_AVATAR_KEY
        sync: false
      - key: AZURE_AVATAR_REGION
        sync: false
      - key: AZURE_AVATAR_ENDPOINT
        sync: false
      - key: AZURE_AVATAR_REALTIME_SUMMARY_MAX_SESSION_SECONDS
        value: "70"
      - key: AZURE_AVATAR_REALTIME_SUMMARY_MAX_REPLAYS
        value: "1"
      - key: AZURE_AVATAR_GBP_PER_MINUTE
        sync: false
      - key: AZURE_AVATAR_CHARS_PER_MIN
        sync: false
      - key: ASS_MODEL
        value: "gpt-5.1"
      - key: LLM_MODEL
        value: "gpt-5.1"
      - key: ADMIN_API_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM
        sync: false
      - key: TWILIO_SMS_FROM
        sync: false
      - key: AUTH_SMS_IF_NO_WHATSAPP_WINDOW
        value: "0"
      - key: AUTH_WHATSAPP_OPEN_WINDOW_HOURS
        value: "24"
      - key: TWILIO_REOPEN_CONTENT_SID
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: HSAPP_PUBLIC_URL
        sync: false
      - key: WEARABLES_ENABLED
        value: "1"
      - key: WEARABLE_OAUTH_STATE_SECRET
        sync: false
      - key: WEARABLE_CALLBACK_BASE_URL
        sync: false
      - key: WEARABLE_OURA_ENABLED
        value: "1"
      - key: OURA_CLIENT_ID
        sync: false
      - key: OURA_CLIENT_SECRET
        sync: false
      - key: OURA_OAUTH_SCOPE
        value: "daily personal email"
      - key: WEARABLE_WHOOP_ENABLED
        value: "1"
      - key: WHOOP_CLIENT_ID
        sync: false
      - key: WHOOP_CLIENT_SECRET
        sync: false
      - key: WHOOP_OAUTH_SCOPE
        value: "offline read:profile read:recovery read:cycles read:sleep"
      - key: WEARABLE_FITBIT_ENABLED
        value: "1"
      - key: FITBIT_CLIENT_ID
        sync: false
      - key: FITBIT_CLIENT_SECRET
        sync: false
      - key: FITBIT_OAUTH_SCOPE
        value: "activity heartrate sleep profile offline_access"
      - key: WEARABLE_GARMIN_ENABLED
        value: "0"
      - key: GARMIN_CLIENT_ID
        sync: false
      - key: GARMIN_CLIENT_SECRET
        sync: false
      - key: WEARABLE_APPLE_HEALTH_ENABLED
        value: "0"
      - key: COACH_NAME
        value: "Gia"
      - key: WEEKSTART_PODCAST_MAX_WORDS
        value: "420"
      - key: REPORTS_BASE_URL
        sync: false
      - key: REPORTS_DIR
        value: "/var/data/reports"
      - key: RESET_DB_ON_STARTUP
        value: "0"
      - key: KEEP_CONTENT_ON_RESET
        value: "1"
      - key: REPORTS_RETENTION_ENABLED
        value: "1"
      - key: REPORTS_WEEKLY_RETENTION_DAYS
        value: "84"
      - key: REPORTS_ASSESSMENT_KEEP_RUNS
        value: "2"
      - key: REPORTS_RETENTION_HOUR_UTC
        value: "3"
      - key: REPORTS_RETENTION_MINUTE_UTC
        value: "30"
      - key: DB_POOL_SIZE
        value: "12"
      - key: DB_MAX_OVERFLOW
        value: "24"
      - key: DB_POOL_TIMEOUT_SEC
        value: "30"
      - key: DB_POOL_RECYCLE_SEC
        value: "1800"
      - key: DB_POOL_USE_LIFO
        value: "true"
      - key: SCHEDULER_MAX_WORKERS
        value: "4"
    disk:
      name: reports-data
      mountPath: /var/data/reports
      sizeGB: 1

  - type: web
    name: healthsense-app
    env: node
    plan: starter
    region: oregon
    rootDir: healthsense-app
    buildCommand: "node ../scripts/check_env.mjs --service hsapp && npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: API_BASE_URL
        sync: false
      - key: ADMIN_API_TOKEN
        sync: false
      - key: ADMIN_USER_ID
        sync: false

  - type: web
    name: healthsense-admin
    env: node
    plan: starter
    region: oregon
    rootDir: healthsense-admin
    buildCommand: "node ../scripts/check_env.mjs --service hsadmin && npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: API_BASE_URL
        sync: false
      - key: ADMIN_API_TOKEN
        sync: false
      - key: ADMIN_USER_ID
        sync: false
      - key: PUBLIC_LEAD_START_KEY
        sync: false
      - key: NEXT_PUBLIC_HSAPP_BASE_URL
        sync: false

  - type: web
    name: membersense
    env: python
    plan: starter
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn membersense.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /healthz
    envVars:
      - key: ENV
        value: "production"
      - key: MEMBERSENSE_GYM_NAME
        value: "Anytime Fitness High Wycombe"
      - key: MEMBERSENSE_DATABASE_URL
        fromDatabase:
          name: membersense-db
          property: connectionString
      - key: MEMBERSENSE_DEFAULT_COUNTRY_CODE
        value: "44"
      - key: MEMBERSENSE_SESSION_SECRET
        generateValue: true
      - key: MEMBERSENSE_SESSION_COOKIE_SECURE
        value: "1"
      - key: MEMBERSENSE_ADMIN_TOKEN
        generateValue: true
      - key: MEMBERSENSE_BOOTSTRAP_STAFF_USERNAME
        value: "jsm"
      - key: MEMBERSENSE_BOOTSTRAP_STAFF_NAME
        value: "JSM"
      - key: MEMBERSENSE_BOOTSTRAP_STAFF_EMAIL
        value: "jsm@membersense.local"
      - key: MEMBERSENSE_BOOTSTRAP_STAFF_PASSWORD
        sync: false
      - key: MEMBERSENSE_DRY_RUN
        value: "1"
      - key: MEMBERSENSE_NGROK
        value: "0"
      - key: MEMBERSENSE_TWILIO_ACCOUNT_SID
        sync: false
      - key: MEMBERSENSE_TWILIO_AUTH_TOKEN
        sync: false
      - key: MEMBERSENSE_TWILIO_FROM
        sync: false
      - key: MEMBERSENSE_TWILIO_MESSAGING_SERVICE_SID
        sync: false

databases:
  - name: healthsense-db
    plan: basic-1gb
    region: oregon

  - name: membersense-db
    plan: basic-256mb
    region: oregon
